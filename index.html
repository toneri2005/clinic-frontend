<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffafbd">
    <title>Welcome · Enter Your Name</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated Background Elements -->
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="particle-field" id="particles"></div>
    </div>

    <div class="app-container">
        <div class="greeting-card" id="mainCard">
            <div class="card-shine"></div>
            
            <div class="card-content">
                <div class="title-wrapper">
                    <h1 class="title">
                        <span class="title-word">Hello</span>
                        <span class="title-word">there!</span>
                    </h1>
                    <div class="title-underline"></div>
                </div>
                
                <p class="subtitle">Before we begin, please tell us your name.</p>
                
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="text" id="nameInput" placeholder=" " autocomplete="off" spellcheck="false">
                        <label for="nameInput" class="input-label">you must be?</label>
                        <div class="input-focus-border"></div>
                    </div>
                    
                    <button id="startBtn" class="btn-magnetic">
                        <span class="btn-text">Enter</span>
                        <span class="btn-arrow">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                        <div class="btn-ripple"></div>
                    </button>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loading" class="loading-overlay hidden">
                <div class="loading-content">
                    <div class="spinner-advanced">
                        <div class="spinner-ring"></div>
                        <div class="spinner-ring"></div>
                        <div class="spinner-ring"></div>
                    </div>
                    <p class="loading-text">Preparing your experience</p>
                    <div class="loading-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
